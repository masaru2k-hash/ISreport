<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ICN Issue Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="/manifest.json">
    <style>
        * { box-sizing: border-box; }
        html, body {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background-color: #0f172a; overscroll-behavior-y: none;
            -webkit-tap-highlight-color: transparent;
        }
        #wrapper { display: flex; flex-direction: column; height: 100dvh; }
        #content { flex: 1; width: 100%; overflow-y: auto; position: relative; overscroll-behavior-y: contain; }
        
        .pwa-banner {
            position: fixed; bottom: 0; left: 0; width: 100%; background: #333; color: white; padding: 15px;
            display: flex; justify-content: space-between; align-items: center; z-index: 9999; box-sizing: border-box;
        }
        .pwa-banner button { background: #4f46e5; color: white; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .ios-guide {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px;
            background: white; color: #333; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            text-align: center; z-index: 9999;
        }
        .ios-guide .arrow-down { font-size: 30px; margin-top: 10px; color: #007aff; animation: bounce 1s infinite; }
        .ios-guide .close-btn { position: absolute; top: 10px; right: 10px; background: none; border: none; font-size: 14px; color: #999; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(10px); } }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans">

    <div id="wrapper">
        <div id="content"><div id="root" style="height: 100%;"></div></div>
    </div>

    <div id="android-install-banner" class="pwa-banner" style="display: none;">
        <span>설치하고 더 편하게 이용하세요!</span>
        <button id="install-btn">지금 설치</button>
    </div>

    <div id="ios-install-guide" class="ios-guide" style="display: none;">
        <div class="guide-content">
            <p>하단의 <strong>[공유]</strong> 버튼을 누르고<br><strong>'홈 화면에 추가'</strong>를 선택하세요.</p>
            <div class="arrow-down">⬇</div>
            <button onclick="this.parentElement.parentElement.style.display='none'" class="close-btn">닫기</button>
        </div>
    </div>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.development.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.development.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
    
    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useCallback, useMemo } = React;

        const PROXY_BASE_URL = 'https://winter-unit-6c7a.masaru2k.workers.dev/?url=';
        const GATE_API_URL = PROXY_BASE_URL + encodeURIComponent('http://apis.data.go.kr/B551177/StatusOfPassengerFlightsDSOdp/getPassengerDeparturesDSOdp?serviceKey=6uC38lshDqWE5U0LuYIGHZ3XeIIEocXrQmhXd11WEmLFLh5ygZSG%2FPNeYov0pyzTU99ISscjIZIp%2FL%2FE2oI%2FYA%3D%3D&type=xml');
        
        const T2_AIRLINES = ['KE', 'LJ', 'DL', 'AF', 'KL', 'AM', 'CI', 'GA', 'MF', 'OZ', 'RS','BX']; 
        const T1_AIRLINES = ['7C','8M','9C','AA','AC','AY','BR','CA','CX','CZ','DD','EK','EY','FD','FM','GK','GS','HB','HO','HU','HX','HY','IT','JD','JX','KC','LO','MH','MM','MU','OM','PR','QD','QK','QR','SC','SL','SQ','SU','TG','TK','TR','TW','UA','UO','UZ','VJ','VN','VZ','XJ','ZE','ZH'];

        const Page = { Main: 0, PingLossTerm: 1, ErrorTypeSelect: 2, PingLossAirlines: 3, PingLossResult: 4 };

        const parseFlightsFromXML = (xmlText) => {
            const parser = new DOMParser(); 
            const xmlDoc = parser.parseFromString(xmlText, 'text/xml');
            const items = xmlDoc.getElementsByTagName('item'); 
            const flights = [];
            
            for (let i = 0; i < items.length; i++) {
                const item = items[i]; 
                const cs = item.querySelector('codeshare')?.textContent?.trim();
                if (cs === 'Slave' || cs === 'slave') continue; 
                
                const flightId = item.querySelector('flightId')?.textContent ?? '';
                const iataCode = flightId.length >= 2 ? flightId.substring(0, 2).toUpperCase() : '';
                
                flights.push({
                    flightId: flightId,
                    iata: iataCode,
                    airline: item.querySelector('airline')?.textContent ?? '',
                    scheduleDateTime: item.querySelector('scheduleDateTime')?.textContent ?? '', 
                    terminalid: item.querySelector('terminalid')?.textContent ?? '',
                    remark: item.querySelector('remark')?.textContent ?? null, 
                    chkinrange: item.querySelector('chkinrange')?.textContent ?? '',
                });
            }
            return flights;
        };

        const fetchFlightData = async () => {
            const f = (d) => `${d.getFullYear()}${String(d.getMonth() + 1).padStart(2, '0')}${String(d.getDate()).padStart(2, '0')}`;
            const t = f(new Date()); 
            const tm = f(new Date(new Date().setDate(new Date().getDate() + 1)));
            const urls = [
                `${GATE_API_URL}&selectdate=${t}&from_time=0000&to_time=2359`,
                `${GATE_API_URL}&selectdate=${tm}&from_time=0000&to_time=2359`
            ];
            const xmls = await Promise.all(urls.map(u => fetch(u).then(res => res.text())));
            const all = xmls.flatMap(x => parseFlightsFromXML(x));
            return all.sort((a, b) => a.scheduleDateTime.localeCompare(b.scheduleDateTime));
        };

        const LoadingSpinner = () => (
            <div className="flex flex-col justify-center items-center h-full">
                <div className="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-indigo-500 mb-4"></div>
                <div className="text-slate-400 font-bold">운항 데이터를 불러오는 중...</div>
            </div>
        );

        const Header = ({ onBack, title }) => (
            <header className="bg-slate-800 p-4 shadow-lg sticky top-0 z-10 flex items-center h-16">
                {onBack && <button onClick={onBack} className="text-indigo-400 text-3xl mr-4 leading-none pb-1">&#8592;</button>}
                <h1 className="text-xl font-bold text-white truncate">{title}</h1>
            </header>
        );

        const getFlightStatusInfo = (flight, nowMs) => {
            if (!flight.scheduleDateTime || flight.scheduleDateTime.length !== 12) return { state: 'UNKNOWN', zone: '알수없음' };
            
            const dep = new Date(
                parseInt(flight.scheduleDateTime.substring(0, 4)),
                parseInt(flight.scheduleDateTime.substring(4, 6)) - 1,
                parseInt(flight.scheduleDateTime.substring(6, 8)),
                parseInt(flight.scheduleDateTime.substring(8, 10)),
                parseInt(flight.scheduleDateTime.substring(10, 12))
            );
            const diffMins = (dep.getTime() - nowMs) / (1000 * 60);
            const isDelayed = flight.remark && flight.remark.includes('지연');
            
            let state = 'UNKNOWN';
            if (diffMins > 180) state = 'NOT_OPEN';
            else if (diffMins >= 50 && diffMins <= 180) state = 'OPEN';
            else if (diffMins < 50 && !isDelayed) state = 'CLOSED';
            else if (diffMins < 50 && isDelayed) state = 'OPEN'; 

            let zone = '미정';
            if (flight.chkinrange && flight.chkinrange !== '---') {
                zone = flight.chkinrange;
            }
            
            return { state, zone };
        };

        const ActiveAirlineCard = ({ airline, zone }) => {
            const [status, setStatus] = useState(null);
            const [congestion, setCongestion] = useState(null);
            const [confirmed, setConfirmed] = useState(false);
            
            const handleConfirm = () => {
                if(!status || !congestion) { alert('운항 상태와 혼잡도를 모두 선택해주세요.'); return; }
                setConfirmed(true);
            };

            const copyToClip = (text) => {
                navigator.clipboard.writeText(text).then(() => alert('복사되었습니다.')).catch(() => alert('복사 실패'));
            };
            
            const getStatusText = (s) => s === '지연발생' ? '시스템 지연발생' : s;
            const finalString = `${airline} ${getStatusText(status)} 혼잡도 ${congestion}`;
            
            if (confirmed) {
                return (
                    <div className="bg-slate-800 p-4 rounded-lg mb-3 border-l-4 border-indigo-500 shadow-md">
                        <div className="font-mono text-lg mb-3 break-all">[{finalString}]</div>
                        <div className="flex justify-end gap-2">
                            <button onClick={() => setConfirmed(false)} className="bg-slate-600 px-4 py-2 rounded font-bold text-sm">취소(수정)</button>
                            <button onClick={() => copyToClip(finalString)} className="bg-cyan-600 px-6 py-2 rounded font-bold text-sm flex items-center gap-1">
                                <span>복사</span>
                            </button>
                        </div>
                    </div>
                );
            }
            
            return (
                <div className="bg-slate-800 p-4 rounded-lg mb-3 border-l-4 border-slate-500 shadow-md">
                    <div className="flex items-center gap-3 mb-4">
                        <span className="bg-slate-700 px-3 py-1 rounded font-bold text-indigo-300">[{zone}]</span>
                        <span className="text-2xl font-bold">{airline}</span>
                    </div>
                    
                    <div className="mb-4">
                        <div className="text-sm text-slate-400 mb-1 font-bold">운항 상태</div>
                        <div className="grid grid-cols-3 gap-2">
                            {['정상수속중', '지연발생', '수속중단'].map(s => (
                                <button key={s} onClick={() => setStatus(s)} 
                                    className={`py-2 rounded text-sm font-bold transition-colors ${status === s ? 'bg-indigo-600 text-white' : 'bg-slate-700 text-slate-400'}`}>
                                    {s}
                                </button>
                            ))}
                        </div>
                    </div>

                    <div className="mb-4">
                        <div className="text-sm text-slate-400 mb-1 font-bold">혼잡도</div>
                        <div className="grid grid-cols-5 gap-2">
                            {['극상', '상', '중', '하', '없음'].map(c => (
                                <button key={c} onClick={() => setCongestion(c)} 
                                    className={`py-2 rounded text-sm font-bold transition-colors ${congestion === c ? 'bg-amber-600 text-white' : 'bg-slate-700 text-slate-400'}`}>
                                    {c}
                                </button>
                            ))}
                        </div>
                    </div>

                    <button onClick={handleConfirm} className="w-full bg-emerald-600 py-3 rounded font-bold text-lg mt-2">확인</button>
                </div>
            );
        };

        const App = () => {
            const [page, setPage] = useState(Page.Main);
            const [flights, setFlights] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selTerm, setSelTerm] = useState(null);
            const [errorType, setErrorType] = useState(null); 
            const [selAirlines, setSelAirlines] = useState(new Set());
            const [showEx, setShowEx] = useState(false);

            useEffect(() => {
                const isIos = () => {
                    const userAgent = window.navigator.userAgent.toLowerCase();
                    return /iphone|ipad|ipod/.test(userAgent);
                };
                const isInStandaloneMode = () => ('standalone' in window.navigator) && (window.navigator.standalone);
                
                let deferredPrompt;
                const banner = document.getElementById('android-install-banner');
                const installBtn = document.getElementById('install-btn');
                const iosGuide = document.getElementById('ios-install-guide');

                window.addEventListener('beforeinstallprompt', (e) => {
                    e.preventDefault();
                    deferredPrompt = e;
                    if (!isIos() && banner) banner.style.display = 'flex';
                });

                if (installBtn) {
                    installBtn.addEventListener('click', async () => {
                        if (banner) banner.style.display = 'none';
                        if (deferredPrompt) {
                            deferredPrompt.prompt();
                            const { outcome } = await deferredPrompt.userChoice;
                            deferredPrompt = null;
                        }
                    });
                }

                if (isIos() && !isInStandaloneMode() && iosGuide) {
                    iosGuide.style.display = 'block';
                }
            }, []);

            useEffect(() => {
                const initHistory = () => {
                    if (!window.history.state || window.history.state.page !== Page.Main) {
                        window.history.replaceState({ page: 'root' }, '');
                        window.history.pushState({ page: Page.Main }, '');
                    }
                };
                
                const handlePopState = (e) => {
                    if (e.state && e.state.page === 'root') {
                        setShowEx(true); 
                        window.history.pushState({ page: Page.Main }, ''); 
                    } else if (e.state && e.state.page !== undefined) {
                        setPage(e.state.page); 
                        setShowEx(false); 
                    }
                };
                
                initHistory();
                window.addEventListener('popstate', handlePopState);
                return () => window.removeEventListener('popstate', handlePopState);
            }, []);

            useEffect(() => {
                const load = async () => {
                    setLoading(true);
                    try { setFlights(await fetchFlightData()); } catch(e) {}
                    finally { setLoading(false); }
                };
                load();
            }, []);

            const currentTerminalAirlines = useMemo(() => {
                if (!selTerm) return [];
                const baseCodes = selTerm === 'T2' ? T2_AIRLINES : T1_AIRLINES;
                const codes = new Set(baseCodes);
                
                flights.forEach(f => { 
                    if(f.iata) {
                        const isT1 = f.terminalid === 'P01' || f.terminalid === 'P02';
                        const isT2 = f.terminalid === 'P03';
                        if (selTerm === 'T1' && isT1) codes.add(f.iata);
                        if (selTerm === 'T2' && isT2) codes.add(f.iata);
                    }
                });
                return Array.from(codes).sort();
            }, [flights, selTerm]);

            const nav = (p) => {
                window.history.pushState({ page: p }, '');
                setPage(p);
            };
            const back = () => window.history.back();

            const exitApp = () => {
                setShowEx(false);
                if (navigator.app) {
                    navigator.app.exitApp(); 
                } else {
                    window.history.go(-2); 
                    setTimeout(() => window.close(), 100); 
                }
            };

            const handleTermSelect = (term) => {
                setSelTerm(term);
                nav(Page.ErrorTypeSelect); 
            };

            const handleErrorTypeSelect = (type) => {
                setErrorType(type);
                setSelAirlines(new Set()); 
                nav(Page.PingLossAirlines);
            };

            const toggleAirline = (al) => {
                const n = new Set(selAirlines);
                if (n.has(al)) n.delete(al); else n.add(al);
                setSelAirlines(n);
            };

            const copySimpleText = (text) => {
                navigator.clipboard.writeText(text).then(() => alert('복사되었습니다.')).catch(() => alert('복사 실패'));
            };

            const renderContent = () => {
                if (loading) return <LoadingSpinner />;

                switch (page) {
                    case Page.Main:
                        return (
                            <div className="flex flex-col h-full">
                                <Header title="공항 시설관리 메뉴" />
                                <main className="flex-grow p-5 flex flex-col gap-4">
                                    <button onClick={() => nav(Page.PingLossTerm)} className="p-8 rounded-lg text-2xl font-bold bg-rose-600 shadow-lg flex items-center justify-between">
                                        <span>체크인카운터 장애 보고</span>
                                        <span className="text-rose-300 text-4xl">!</span>
                                    </button>
                                    <div className="text-center text-slate-500 mt-10 text-sm">추가 메뉴는 여기에 배치됩니다.</div>
                                </main>
                            </div>
                        );
                    
                    case Page.PingLossTerm:
                        return (
                            <div className="flex flex-col h-full">
                                <Header onBack={back} title="장애 터미널 선택" />
                                <main className="flex-grow p-5 flex flex-col justify-center gap-6">
                                    <button onClick={() => handleTermSelect('T1')} className="p-12 rounded-lg text-3xl font-bold bg-cyan-700 shadow-lg">T1 (1터미널)</button>
                                    <button onClick={() => handleTermSelect('T2')} className="p-12 rounded-lg text-3xl font-bold bg-emerald-700 shadow-lg">T2 (2터미널)</button>
                                </main>
                            </div>
                        );

                    case Page.ErrorTypeSelect:
                        return (
                            <div className="flex flex-col h-full">
                                <Header onBack={back} title={`${selTerm} 장애 유형 선택`} />
                                <main className="flex-grow p-5 flex flex-col justify-center gap-4">
                                    <button onClick={() => handleErrorTypeSelect('전체')} className="p-8 rounded-lg text-2xl font-bold bg-indigo-600 shadow-lg">전체</button>
                                    <button onClick={() => handleErrorTypeSelect('네트워크망')} className="p-8 rounded-lg text-2xl font-bold bg-blue-600 shadow-lg">네트워크망</button>
                                    <button onClick={() => handleErrorTypeSelect('DCS')} className="p-8 rounded-lg text-2xl font-bold bg-purple-600 shadow-lg">DCS</button>
                                </main>
                            </div>
                        );

                    case Page.PingLossAirlines:
                        return (
                            <div className="flex flex-col h-full">
                                <Header onBack={back} title={`[${errorType}] 항공사 선택`} />
                                <div className="flex-grow overflow-y-auto p-3 content-start">
                                    <div className="grid grid-cols-5 sm:grid-cols-6 gap-1.5">
                                        {currentTerminalAirlines.map(al => (
                                            <button key={al} onClick={() => toggleAirline(al)} 
                                                className={`py-2.5 rounded font-bold text-base transition-all ${selAirlines.has(al) ? 'bg-rose-500 text-white ring-1 ring-white scale-95' : 'bg-slate-800 text-slate-400'}`}>
                                                {al}
                                            </button>
                                        ))}
                                    </div>
                                    <div className="h-24"></div>
                                </div>
                                <div className="p-4 bg-slate-900 border-t border-slate-700 absolute bottom-0 left-0 w-full">
                                    <button onClick={() => nav(Page.PingLossResult)} disabled={selAirlines.size === 0} 
                                        className="w-full py-4 bg-indigo-600 disabled:bg-slate-700 font-bold text-xl rounded-lg shadow-lg">
                                        결과 확인 ({selAirlines.size}개)
                                    </button>
                                </div>
                            </div>
                        );

                    case Page.PingLossResult:
                        const nowMs = new Date().getTime();
                        
                        // 오늘 날짜 문자열 구하기 (예: "20260709")
                        const getYYYYMMDD = (d) => `${d.getFullYear()}${String(d.getMonth() + 1).padStart(2, '0')}${String(d.getDate()).padStart(2, '0')}`;
                        const todayStr = getYYYYMMDD(new Date());

                        const noFlights = [];
                        const closed = [];
                        const notOpen = [];
                        const activeList = [];

                        Array.from(selAirlines).forEach(al => {
                            // 필터링 강화: 오늘 항공편이거나 4시간 이내로 남은 내일(새벽) 항공편만 포함
                            const termFlights = flights.filter(f => {
                                const isMatch = f.iata === al && 
                                    (selTerm === 'T1' ? (f.terminalid === 'P01' || f.terminalid === 'P02') : f.terminalid === 'P03');
                                
                                if (!isMatch) return false;

                                const dep = new Date(
                                    parseInt(f.scheduleDateTime.substring(0, 4)),
                                    parseInt(f.scheduleDateTime.substring(4, 6)) - 1,
                                    parseInt(f.scheduleDateTime.substring(6, 8)),
                                    parseInt(f.scheduleDateTime.substring(8, 10)),
                                    parseInt(f.scheduleDateTime.substring(10, 12))
                                );
                                const diffMins = (dep.getTime() - nowMs) / (1000 * 60);
                                const isToday = f.scheduleDateTime.startsWith(todayStr);

                                // 오늘 편이거나, 4시간(240분) 이내의 임박한 비행편만 계산에 포함
                                return isToday || (!isToday && diffMins <= 240);
                            });

                            // 조건에 맞는 비행편이 전혀 없으면 '금일 운항편 없음'으로 처리
                            if (termFlights.length === 0) {
                                noFlights.push(al);
                                return;
                            }

                            let hasOpen = false;
                            let hasNotOpen = false;
                            let activeZone = '';

                            termFlights.forEach(f => {
                                const info = getFlightStatusInfo(f, nowMs);
                                if (info.state === 'OPEN') {
                                    hasOpen = true;
                                    if (!activeZone && info.zone !== '알수없음') activeZone = info.zone;
                                } else if (info.state === 'NOT_OPEN') {
                                    hasNotOpen = true;
                                }
                            });

                            if (hasOpen) {
                                activeList.push({ airline: al, zone: activeZone || '위치확인요망' });
                            } else if (hasNotOpen) {
                                notOpen.push(al);
                            } else {
                                closed.push(al); 
                            }
                        });

                        const strNoFlight = noFlights.length > 0 ? `${noFlights.join(',')} 금일 운항편 없음` : null;
                        const strClosed = closed.length > 0 ? `${closed.join(',')} 카운터 마감` : null;
                        const strNotOpen = notOpen.length > 0 ? `${notOpen.join(',')} 카운터 오픈 전` : null;

                        return (
                            <div className="flex flex-col h-full">
                                <Header onBack={back} title={`${selTerm} ${errorType} 보고내용`} />
                                <div className="flex-grow overflow-y-auto p-4 space-y-6">
                                    
                                    {(strNoFlight || strClosed || strNotOpen) && (
                                        <div className="space-y-3">
                                            {strNoFlight && (
                                                <div className="flex justify-between items-center bg-slate-800 p-4 rounded-lg">
                                                    <span className="font-mono text-lg text-rose-300 break-all">[{strNoFlight}]</span>
                                                    <button onClick={() => copySimpleText(strNoFlight)} className="ml-2 bg-cyan-600 px-3 py-2 rounded font-bold shrink-0">복사</button>
                                                </div>
                                            )}
                                            {strClosed && (
                                                <div className="flex justify-between items-center bg-slate-800 p-4 rounded-lg">
                                                    <span className="font-mono text-lg text-slate-400 break-all">[{strClosed}]</span>
                                                    <button onClick={() => copySimpleText(strClosed)} className="ml-2 bg-cyan-600 px-3 py-2 rounded font-bold shrink-0">복사</button>
                                                </div>
                                            )}
                                            {strNotOpen && (
                                                <div className="flex justify-between items-center bg-slate-800 p-4 rounded-lg">
                                                    <span className="font-mono text-lg text-amber-300 break-all">[{strNotOpen}]</span>
                                                    <button onClick={() => copySimpleText(strNotOpen)} className="ml-2 bg-cyan-600 px-3 py-2 rounded font-bold shrink-0">복사</button>
                                                </div>
                                            )}
                                        </div>
                                    )}

                                    {activeList.length > 0 && (
                                        <div>
                                            <div className="text-indigo-400 font-bold mb-3 border-b border-slate-700 pb-2">수속 진행중 카운터 ({activeList.length})</div>
                                            {activeList.map(item => (
                                                <ActiveAirlineCard key={item.airline} airline={item.airline} zone={item.zone} />
                                            ))}
                                        </div>
                                    )}

                                    {selAirlines.size > 0 && activeList.length === 0 && !strNoFlight && !strClosed && !strNotOpen && (
                                        <div className="text-center text-slate-400 mt-10">해당 조건의 데이터가 없습니다.</div>
                                    )}

                                </div>
                            </div>
                        );
                }
            };

            return (
                <div className="max-w-md mx-auto bg-slate-900 h-full shadow-2xl relative">
                    {renderContent()}
                    
                    {showEx && (
                        <div className="absolute inset-0 bg-black/80 flex items-center justify-center z-50">
                            <div className="bg-slate-800 p-6 rounded-lg w-4/5 text-center shadow-xl">
                                <h3 className="text-xl font-bold mb-6 text-white">앱을 종료하시겠습니까?</h3>
                                <div className="flex gap-3">
                                    <button onClick={() => setShowEx(false)} className="flex-1 py-3 rounded bg-slate-600 font-bold text-white transition hover:bg-slate-500">취소</button>
                                    <button onClick={exitApp} className="flex-1 py-3 rounded bg-rose-600 font-bold text-white transition hover:bg-rose-500">예(종료)</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
